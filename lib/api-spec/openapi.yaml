openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ERP System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: products
    description: Product management
  - name: categories
    description: Categories management
  - name: brands
    description: Brands management
  - name: customers
    description: Customer management
  - name: suppliers
    description: Supplier management
  - name: purchases
    description: Purchase management
  - name: sales
    description: Sales management
  - name: inventory
    description: Inventory management
  - name: cashRegister
    description: Cash register management
  - name: offers
    description: Offers and promotions
  - name: paymentMethods
    description: Payment methods
  - name: finance
    description: Financial management
  - name: orders
    description: Web orders management
  - name: shipments
    description: Shipment management
  - name: reports
    description: Reports
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
